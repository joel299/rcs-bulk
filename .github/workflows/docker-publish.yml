name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/alcate-ia/rcs-bulk-backend
  FRONTEND_IMAGE: ghcr.io/alcate-ia/rcs-bulk-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: packages/frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=https://rcs-api.representacoes-ia.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy stack no Portainer
        run: |
          TOKEN=$(curl -s -X POST https://portainer.representacoes-ia.com/api/auth \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"admin\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')

          STACK_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://portainer.representacoes-ia.com/api/stacks" \
            | jq -r '.[] | select(.Name=="rcs-bulk") | .Id')

          curl -s -X PUT \
            "https://portainer.representacoes-ia.com/api/stacks/${STACK_ID}/git/redeploy?endpointId=1" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"pullImage": true, "repositoryAuthentication": false}'
          echo "Redeploy solicitado"
